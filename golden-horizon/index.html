<body>
    <header>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="conditions.html">Conditions</a></li>
            </ul>
        </nav>

    <section class="hero">
        <h1>Explore the World</h1>

    <section class="destinations">
        <h2>Popular Destinations</h2>
        <div class="card"><a href="thailand.html">Thailand</a></div>

        <!-- Add more cards as needed -->

    <section class="booking">
        <h2>Book Your Trip</h2>
        <form>
            <input type="text" name="name" placeholder="Name" required>
            <input type="text" name="surname" placeholder="Surname" required>
            <input type="number" name="numberOfPeople" placeholder="Number of People" required>
            <input type="text" name="passportStatus" placeholder="Passport Status" required>
            <input type="date" name="dob" placeholder="Date of Birth" required>
            <input type="text" name="address" placeholder="Address" required>
            <input type="text" name="destination" placeholder="Destination" required>
            <input type="date" name="desiredDate" placeholder="Desired Date" required>
            <input type="number" name="adultCount" placeholder="Adults" required>
            <input type="number" name="children" placeholder="Children under 11"><
            <button type="submit">Book Now</button>
        </form>
    </section>
    <footer>
